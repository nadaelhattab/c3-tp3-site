<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <!-- Fond dégradé -->
  <rect width="800" height="600" fill="url(#g)"/>
  <!-- Cercles décoratifs flous -->
  <circle cx="800" cy="0" r="250" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>
  <circle cx="0" cy="600" r="200" fill="rgba(255,255,255,0.04)" filter="url(#blur)"/>
  <!-- Grille de points -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <!-- Emoji central -->
  <text x="50%" y="42%" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="serif">🔬</text>
  <!-- Titre -->
  <text x="50%" y="60%" text-anchor="middle" dominant-baseline="middle"
        font-size="22" font-weight="700" font-family="Georgia, serif"
        fill="rgba(255,255,255,0.95)">BI Dashboard</text>
  <!-- Sous-titre -->
  <text x="50%" y="70%" text-anchor="middle" dominant-baseline="middle"
        font-size="13" font-family="Arial, sans-serif"
        fill="rgba(255,255,255,0.55)">Business Intelligence · Power BI</text>
  <!-- Badge en bas -->
  <rect x="50%" y="82%" width="120" height="26" rx="13" fill="rgba(255,255,255,0.12)"
        transform="translate(-60,0)"/>
  <text x="50%" y="82%" dy="16" text-anchor="middle"
        font-size="11" font-family="monospace" fill="rgba(255,255,255,0.6)">nexora.ma</text>
</svg>
